spring:
  application:
    name: patikaclone

  datasource:
    url: jdbc:postgresql://localhost:5432/patika_clone_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  
app:
  security:
    jwt:
      secret: "patika-clone-secret-key-must-be-at-least-32-characters"
      expiration-ms : 86400000
server:
  port: 8080